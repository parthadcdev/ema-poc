<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EMA Playground</title>
<style>
/* ---- Design tokens (shared with dashboard) ---- */
/* AbbVie brand palette:
   --accent-deep / --accent: #071D49  AbbVie primary navy (logo + chrome)
   --accent-mid:             #0A2B6E  navy hover (lighter navy)
   Magenta accent:           #C8102E  AbbVie signature crimson-magenta (buttons, active, links)
   Source: faithful approximation of AbbVie corporate identity; abbvie.com returned 403 for all
   fetch attempts, so hex values are derived from the widely documented AbbVie brand guidelines
   (primary navy #071D49, brand red/magenta #C8102E). */
:root {
  --paper: #F0F2F7;
  --surface: #FFFFFF;
  --surface-2: #F4F5F9;
  --ink: #0D1B3E;
  --ink-soft: #3D4766;
  --ink-faint: #7E85A3;
  --rule: #CDD1E0;
  --rule-soft: #DDE0EC;
  --accent: #C8102E;
  --accent-deep: #071D49;
  --accent-mid: #A50D26;
  /* Semantic sentiment scale — kept visually distinct from brand navy/magenta */
  --pos: #1A7A4A;
  --pos-soft: #D4EED9;
  --neu: #A07010;
  --neu-soft: #F5E8C8;
  --neg: #C8102E;
  --neg-soft: #FAD9DE;
  /* Typography */
  --serif: "Iowan Old Style", "Hoefler Text", Georgia, "Times New Roman", serif;
  --sans: ui-sans-serif, -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  /* Radii / shadows */
  --radius: 4px;
  --radius-lg: 8px;
  --shadow-sm: 0 1px 3px rgba(7, 29, 73, 0.08), 0 1px 2px rgba(7, 29, 73, 0.04);
  --shadow-card: 0 1px 0 rgba(7, 29, 73, 0.03), 0 10px 24px -20px rgba(7, 29, 73, 0.32);
}

/* ---- Reset ---- */
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; font-size: 15px; }
body {
  font-family: var(--sans);
  font-size: 1rem;
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
}

/* ---- Shared app-nav bar (consistent with dashboard) ---- */
.appbar {
  background: var(--accent-deep);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 0 1.6rem;
  box-shadow: 0 1px 8px -4px rgba(7, 29, 73, 0.5);
  position: sticky;
  top: 0;
  z-index: 11;
}
.appbar-title {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 600;
  letter-spacing: -.01em;
  color: #FFFFFF;
  padding: .9rem 0;
  white-space: nowrap;
}
.apptabs {
  display: flex;
  align-items: stretch;
  gap: .25rem;
}
.apptab {
  display: inline-flex;
  align-items: center;
  color: rgba(255, 255, 255, .78);
  text-decoration: none;
  font-family: var(--sans);
  font-size: .85rem;
  font-weight: 500;
  letter-spacing: .01em;
  padding: 1rem .9rem;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.apptab:hover { color: #fff; }
.apptab.active {
  color: #fff;
  font-weight: 600;
  border-bottom-color: var(--accent);
}
.apptab:focus-visible {
  outline: 2px solid rgba(255, 255, 255, .7);
  outline-offset: -2px;
}

/* ---- Header (page subtitle below the app bar) ---- */
header {
  background: var(--accent-deep);
  color: #fff;
  padding: 0 1.6rem .85rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
header h1 {
  margin: 0;
  font-family: var(--sans);
  font-size: .85rem;
  font-weight: 400;
  letter-spacing: .01em;
  flex: 1;
  color: rgba(255, 255, 255, .82);
}

/* ---- Main layout ---- */
main {
  max-width: 1100px;
  margin: 1.75rem auto;
  padding: 0 1.25rem;
}

/* ---- Panel (query form) ---- */
.panel {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 1.4rem 1.6rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow-card);
}

/* ---- Section kicker label above textarea ---- */
.panel-label {
  display: block;
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: .4rem;
}

/* ---- Form controls ---- */
textarea {
  width: 100%;
  box-sizing: border-box;
  min-height: 80px;
  font-family: var(--sans);
  font-size: 1rem;
  color: var(--ink);
  padding: .65rem .85rem;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  background: var(--surface-2);
  resize: vertical;
  line-height: 1.6;
  transition: border-color .15s, box-shadow .15s;
}
textarea::placeholder { color: var(--ink-faint); }
textarea:focus {
  outline: none;
  border-color: var(--accent-deep);
  box-shadow: 0 0 0 3px rgba(7, 29, 73, .12);
  background: var(--surface);
}

.row {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  align-items: flex-end;
  margin-top: 1rem;
}

/* Form field labels: clean sans kicker + control stacked */
label {
  font-family: var(--sans);
  font-size: .75rem;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--ink-faint);
  display: flex;
  flex-direction: column;
  gap: .3rem;
}
label span {
  font-family: var(--sans);
  font-size: .9rem;
  font-weight: 400;
  letter-spacing: normal;
  text-transform: none;
  color: var(--ink-soft);
}

select, input[type="text"] {
  font-family: var(--sans);
  font-size: .9rem;
  color: var(--ink);
  padding: .4rem .55rem;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  background: var(--surface);
  transition: border-color .15s, box-shadow .15s;
}
select:focus, input[type="text"]:focus {
  outline: none;
  border-color: var(--accent-deep);
  box-shadow: 0 0 0 3px rgba(7, 29, 73, .12);
}

/* ---- Targets row ---- */
.targets {
  display: flex;
  flex-wrap: wrap;
  gap: .4rem .9rem;
  align-items: center;
  padding: .7rem .85rem;
  background: var(--surface-2);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius);
  margin-top: 1rem;
}
.targets label {
  flex-direction: row;
  align-items: center;
  gap: .4rem;
  font-family: var(--sans);
  font-size: .875rem;
  font-weight: 400;
  letter-spacing: normal;
  text-transform: none;
  color: var(--ink-soft);
  cursor: pointer;
  white-space: nowrap;
  padding: .1rem 0;
}
.targets label input[type="checkbox"] {
  accent-color: var(--accent);
  width: 15px;
  height: 15px;
  cursor: pointer;
}

/* ---- Run button ---- */
button#run {
  font-family: var(--sans);
  font-size: .875rem;
  font-weight: 600;
  letter-spacing: .02em;
  background: var(--accent);
  color: #fff;
  border: 0;
  border-radius: var(--radius);
  padding: .55rem 1.5rem;
  cursor: pointer;
  transition: background .15s, transform .1s;
  box-shadow: 0 1px 3px rgba(200, 16, 46, .28);
}
button#run:hover { background: var(--accent-mid); }
button#run:active { transform: scale(.97); }
button#run:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
button#run:disabled {
  opacity: .5;
  cursor: default;
  transform: none;
}

/* ---- Status spinner ---- */
.spinner {
  font-family: var(--sans);
  font-size: .875rem;
  color: var(--ink-faint);
}
/* pulsing animation for "Running…" state, respects prefers-reduced-motion */
@keyframes pulse-fade {
  0%, 100% { opacity: 1; }
  50%       { opacity: .45; }
}
.spinner:not(:empty) {
  animation: pulse-fade 1.4s ease-in-out infinite;
}
@media (prefers-reduced-motion: reduce) {
  .spinner:not(:empty) { animation: none; }
}

/* ---- Compliance note ---- */
.note {
  font-family: var(--sans);
  font-size: .8rem;
  color: var(--ink-faint);
  margin-top: 1rem;
  padding: .55rem .85rem;
  background: var(--surface-2);
  border-left: 3px solid var(--rule);
  border-radius: 0 var(--radius) var(--radius) 0;
  line-height: 1.55;
}

/* ---- Error banner ---- */
#banner { margin-bottom: .5rem; }
.err {
  background: var(--neg-soft);
  color: var(--neg);
  border: 1px solid #F4A8B5;
  padding: .7rem 1rem;
  border-radius: var(--radius);
  font-size: .9rem;
  font-weight: 500;
  line-height: 1.5;
}

/* ---- Results grid ---- */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1.2rem;
}

/* ---- Result cards ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 1.2rem 1.4rem;
  box-shadow: var(--shadow-card);
  transition: box-shadow .15s;
  /* Staggered reveal */
  animation: card-in .25s ease both;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  .card { animation: none; }
}
.card:hover { box-shadow: 0 4px 18px -8px rgba(7, 29, 73, .25); }
.card h3 {
  margin: 0 0 .35rem;
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -.01em;
  display: flex;
  align-items: center;
  gap: .4rem;
}

/* ---- Badges (e.g. "web" grounded indicator) ---- */
.badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .05em;
  text-transform: uppercase;
  background: rgba(7, 29, 73, .08);
  color: var(--accent-deep);
  border: 1px solid rgba(7, 29, 73, .18);
  border-radius: 999px;
  padding: .1rem .45rem;
  vertical-align: middle;
}

/* ---- Chips (sentiment, positioning) ---- */
.chip {
  display: inline-block;
  font-family: var(--sans);
  font-size: .8rem;
  font-weight: 500;
  letter-spacing: .01em;
  border-radius: 999px;
  padding: .2rem .65rem;
  margin-right: .35rem;
  border: 1px solid transparent;
  white-space: nowrap;
}
/* Shared chip vocabulary — mirrors dashboard semantic scale */
/* Positive positioning */
.chip[style*="#d6f5d6"],
.chip[style*="#e6f0ff"] {
  background: var(--pos-soft) !important;
  color: #14593A !important;
  border-color: #A8D9BA !important;
  /* inline style overrides handled below via JS-injected colors */
}
/* Score chips use surface */
.chip[style*="#f0f0f0"] {
  background: var(--surface-2) !important;
  color: var(--ink-soft) !important;
  border-color: var(--rule) !important;
}
/* NOT_RECOMMENDED and NOT_MENTIONED prominence */
.chip[style*="#fdd"] {
  background: var(--neg-soft) !important;
  color: var(--neg) !important;
  border-color: #F4A8B5 !important;
  font-weight: 600 !important;
}

/* ---- Answer text ---- */
.answer {
  white-space: pre-wrap;
  font-size: .9375rem;
  line-height: 1.65;
  margin: .6rem 0;
  color: var(--ink);
}

/* ---- Rendered Markdown (.md-scoped so it can't leak into card chrome) ---- */
.md { font-size: .9375rem; color: var(--ink); line-height: 1.55; }
.md > *:first-child { margin-top: 0; }
.md > *:last-child { margin-bottom: 0; }
.md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
  font-family: var(--serif); font-weight: 600; color: var(--ink);
  line-height: 1.3; margin: .85em 0 .35em; letter-spacing: -.01em;
}
.md h1 { font-size: 1.05rem; border-bottom: 1px solid var(--rule-soft); padding-bottom: .3em; }
.md h2 { font-size: 1rem; }
.md h3 { font-size: .95rem; }
.md h4, .md h5, .md h6 { font-size: .9rem; color: var(--ink-soft); }
.md p { line-height: 1.55; margin: .5em 0; }
.md ul, .md ol { padding-left: 1.4em; margin: .5em 0; }
.md li { margin: .2em 0; line-height: 1.5; }
.md code {
  font-family: var(--mono); font-size: .9em; background: var(--surface-2);
  padding: .05em .35em; border-radius: 3px; border: 1px solid var(--rule-soft);
}
.md pre {
  background: var(--surface-2); border: 1px solid var(--rule-soft);
  padding: .6rem; overflow-x: auto; border-radius: var(--radius); margin: .6em 0;
}
.md pre code { background: none; border: none; padding: 0; font-size: .85rem; line-height: 1.5; }
.md-table {
  border-collapse: collapse; width: auto; max-width: 100%; margin: .6em 0;
  font-size: .9em; display: block; overflow-x: auto;
}
.md-table th, .md-table td {
  border: 1px solid var(--rule); padding: .35rem .6rem; text-align: left; vertical-align: top;
}
.md-table th { background: var(--surface-2); color: var(--ink); font-weight: 600; white-space: nowrap; }
.md-table tbody tr:nth-child(even) td { background: rgba(240, 242, 247, .5); }
.md blockquote {
  margin: .5em 0; padding: .2em .8em; border-left: 3px solid var(--accent);
  color: var(--ink-soft);
}
.md a { color: var(--accent); text-decoration: none; }
.md a:hover { text-decoration: underline; }

/* ---- Citations ---- */
.citations {
  font-size: .8125rem;
  border-top: 1px solid var(--rule-soft);
  padding-top: .55rem;
  margin-top: .45rem;
  color: var(--ink-soft);
}
.citations strong {
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.citations a {
  color: var(--accent-deep);
  text-decoration: none;
}
.citations a:hover { text-decoration: underline; color: var(--accent); }
.citations a:focus-visible { outline: 2px solid var(--accent-deep); outline-offset: 1px; border-radius: 2px; }
.citations ul {
  margin: .3rem 0 0;
  padding-left: 1.2rem;
}
.citations li { margin: .25rem 0; }

/* ---- Score row ---- */
.score {
  display: flex;
  flex-wrap: wrap;
  gap: .3rem;
  margin: .4rem 0;
}
.score-fail {
  color: #b00020;
  font-size: .8rem;
  margin: .4rem 0;
}

/* ---- Workspace: results + Recent questions side column ---- */
.workspace {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 280px;
  gap: 1.5rem;
  align-items: start;
}
@media (max-width: 820px) {
  .workspace { grid-template-columns: 1fr; }
}

/* ---- Recent questions panel ---- */
.recent-panel {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 1rem 1.1rem 1.2rem;
  box-shadow: var(--shadow-card);
  position: sticky;
  top: 4.5rem;
}
.recent-title {
  margin: 0 0 .7rem;
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  font-weight: 600;
}
#recent-list {
  list-style: none;
  margin: 0;
  padding: 0;
}
.recent-empty {
  font-size: .85rem;
  color: var(--ink-faint);
  line-height: 1.5;
}
.recent-item {
  font-size: .85rem;
  line-height: 1.45;
  color: var(--ink-soft);
  padding: .55rem .15rem;
  border-top: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: color .12s;
}
.recent-item:first-child { border-top: 0; }
.recent-item:hover { color: var(--accent-deep); }
.recent-item.active { color: var(--ink); font-weight: 500; }
.recent-item:focus-visible {
  outline: 2px solid var(--accent-deep);
  outline-offset: 1px;
  border-radius: 2px;
}

/* ---- Status chips for Recent questions ---- */
.chip-status {
  display: inline-block;
  font-family: var(--mono);
  font-size: .62rem;
  letter-spacing: .04em;
  text-transform: uppercase;
  font-weight: 600;
  border-radius: 999px;
  padding: .08rem .42rem;
  margin-right: .4rem;
  border: 1px solid transparent;
  white-space: nowrap;
  vertical-align: middle;
  /* Default/fallback so an unexpected status string still shows a visible chip */
  background: var(--surface-2);
  color: var(--ink-soft);
  border-color: var(--rule);
}
.chip-running {
  background: var(--neu-soft);
  color: var(--neu);
  border-color: #E6D29A;
}
.chip-done {
  background: var(--pos-soft);
  color: #14593A;
  border-color: #A8D9BA;
}
.chip-failed {
  background: var(--neg-soft);
  color: var(--neg);
  border-color: #F4A8B5;
}
</style>
</head>
<body>
<div class="appbar">
  <span class="appbar-title">Evidence Monitoring Agent</span>
  <nav class="apptabs">
    <a href="/" class="apptab active">Playground</a>
    <a href="/dashboard" class="apptab">Dashboard</a>
  </nav>
</div>
<header>
  <h1>Real-Time Playground</h1>
</header>
<main>
  <div class="panel">
    <textarea id="question" placeholder="Ask any question (do NOT enter PII/PHI)&hellip;"></textarea>
    <div class="row">
      <label>Persona
        <select id="persona">
          <option value="">(default)</option>
          <option>Prospect</option><option>Provider</option><option>Patient</option>
        </select>
      </label>
      <label>Brand focus
        <input id="brand" type="text" placeholder="e.g. Skyrizi" size="14">
      </label>
    </div>
    <div class="row targets" id="targets"></div>
    <div class="row">
      <button id="run">Run</button>
      <span id="status" class="spinner"></span>
    </div>
    <div class="note">Sandbox mode &mdash; results are stored separately from the approval-gated monitoring data and never feed the official dashboard. Do not enter PII/PHI (SE-001).</div>
  </div>
  <div id="banner"></div>
  <div class="workspace">
    <div class="grid" id="results"></div>
    <aside class="recent-panel">
      <h3 class="recent-title">Recent questions</h3>
      <ul id="recent-list"></ul>
    </aside>
  </div>
</main>
<script>
const POSCOLOR = {
  FIRST_LINE_RECOMMENDED: "#d6f5d6", AMONG_OPTIONS: "#e6f0ff",
  SECOND_LINE: "#fff2cc", NOT_RECOMMENDED: "#fdd", NOT_MENTIONED: "#eee"
};
function esc(s){ return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
  {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function safeUrl(u){ u = String(u || ""); return /^https?:\/\//i.test(u) ? u : "#"; }

/* ---- Minimal, XSS-safe Markdown renderer (escape-first) ---- */
function renderMarkdown(src){
  if (src == null) return "";
  function mdEsc(s){ return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }
  function mdUrl(u){ u = String(u||""); return /^https?:\/\//i.test(u) ? u : "#"; }
  function inl(s){
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, function(m,t,u){
      return '<a href="' + mdEsc(mdUrl(u)) + '" target="_blank" rel="noopener noreferrer">' + t + '</a>'; });
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
    return s;
  }
  var lines = mdEsc(src).split(/\r?\n/), out = [], i = 0;
  function cells(row){ var c = row.split('|');
    if (c.length && c[0].trim()==='') c.shift();
    if (c.length && c[c.length-1].trim()==='') c.pop();
    return c.map(function(x){ return x.trim(); }); }
  while (i < lines.length){
    var line = lines[i];
    if (/^```/.test(line)){ var b=[]; i++; while(i<lines.length && !/^```/.test(lines[i])){ b.push(lines[i]); i++; } i++;
      out.push('<pre><code>'+b.join('\n')+'</code></pre>'); continue; }
    if (/\|/.test(line) && i+1<lines.length && /-/.test(lines[i+1]) && /^[\s|:-]+$/.test(lines[i+1])){
      var head=cells(line); i+=2; var rows=[];
      while(i<lines.length && /\|/.test(lines[i]) && lines[i].trim()!==''){ rows.push(cells(lines[i])); i++; }
      out.push('<table class="md-table"><thead><tr>'+head.map(function(h){return '<th>'+inl(h)+'</th>';}).join('')+
        '</tr></thead><tbody>'+rows.map(function(r){return '<tr>'+r.map(function(c){return '<td>'+inl(c)+'</td>';}).join('')+'</tr>';}).join('')+
        '</tbody></table>'); continue; }
    var h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h){ out.push('<h'+h[1].length+'>'+inl(h[2])+'</h'+h[1].length+'>'); i++; continue; }
    if (/^&gt;\s?/.test(line)){ var q=[]; while(i<lines.length && /^&gt;\s?/.test(lines[i])){ q.push(lines[i].replace(/^&gt;\s?/,'')); i++; }
      out.push('<blockquote>'+inl(q.join(' '))+'</blockquote>'); continue; }
    if (/^\s*[-*+]\s+/.test(line)){ var u=[]; while(i<lines.length && /^\s*[-*+]\s+/.test(lines[i])){ u.push(lines[i].replace(/^\s*[-*+]\s+/,'')); i++; }
      out.push('<ul>'+u.map(function(it){return '<li>'+inl(it)+'</li>';}).join('')+'</ul>'); continue; }
    if (/^\s*\d+\.\s+/.test(line)){ var o=[]; while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ o.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; }
      out.push('<ol>'+o.map(function(it){return '<li>'+inl(it)+'</li>';}).join('')+'</ol>'); continue; }
    if (/^\s*$/.test(line)){ i++; continue; }
    var p=[line]; i++;
    while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6}\s|&gt;|\s*[-*+]\s|\s*\d+\.\s|```)/.test(lines[i]) && !/\|/.test(lines[i])){ p.push(lines[i]); i++; }
    out.push('<p>'+inl(p.join(' '))+'</p>');
  }
  return out.join('');
}

let targetsData = [];

async function loadTargets() {
  const res = await fetch("/api/targets");
  const data = await res.json();
  targetsData = data.targets;
  const box = document.getElementById("targets");
  box.innerHTML = targetsData.map(t =>
    `<label><input type="checkbox" class="tgt" value="${t.name}" checked> ${t.name}` +
    (t.grounded ? ' <span class="badge">web</span>' : '') + `</label>`
  ).join("");
}

function cardId(name){ return "card-" + name.replace(/[^a-zA-Z0-9]/g, "_"); }

function ensureCard(name, grounded) {
  let el = document.getElementById(cardId(name));
  if (!el) {
    el = document.createElement("div");
    el.className = "card";
    el.id = cardId(name);
    el.innerHTML = `<h3>${esc(name)}${grounded ? ' <span class="badge">web</span>' : ''}</h3>` +
                   `<div class="score"></div><div class="answer"></div><div class="citations"></div>`;
    document.getElementById("results").appendChild(el);
  }
  return el;
}

/* Render one answer card from a response object (shape from
   GET /api/queries/{id}: llm_name, grounded, status, answer_text, tokens,
   sentiment_score, competitive_position, scoring_rationale, citations). */
function renderAnswerCard(ev) {
  const groundedByName = Object.fromEntries(targetsData.map(t => [t.name, t.grounded]));
  const grounded = ev.grounded != null ? ev.grounded : groundedByName[ev.llm_name];
  const card = ensureCard(ev.llm_name, grounded);

  card.querySelector(".answer").innerHTML = '<div class="md">' +
    renderMarkdown(ev.answer_text || ("(no answer — " + esc(ev.status) + ")")) + '</div>';

  if (ev.scoring_error) {
    card.querySelector(".score").innerHTML =
      "<div class='score-fail'>⚠ Scoring failed: " + esc(ev.scoring_error) + "</div>";
  } else if (ev.competitive_position != null || ev.sentiment_score != null) {
    const color = POSCOLOR[ev.competitive_position] || "#eee";
    let html = "";
    if (ev.competitive_position != null) {
      html += `<span class="chip" style="background:${color}">${esc(ev.competitive_position)}</span>`;
    }
    if (ev.sentiment_score != null) {
      html += `<span class="chip" style="background:#f0f0f0">sentiment ${esc(ev.sentiment_score)}</span>`;
    }
    card.querySelector(".score").innerHTML = html;
  }

  if (ev.citations && ev.citations.length) {
    card.querySelector(".citations").innerHTML = "<strong>Sources:</strong><ul>" +
      ev.citations.map(c =>
        `<li><a href="${esc(safeUrl(c.url))}" target="_blank" rel="noopener noreferrer">${esc(c.title || c.url)}</a></li>`
      ).join("") + "</ul>";
  }
}

/* Render the full set of answer cards for a query's responses. */
function renderAnswers(responses) {
  document.getElementById("results").innerHTML = "";
  (responses || []).forEach(renderAnswerCard);
}

let pollTimer = null;
let activeQueryId = null;

async function refreshRecent() {
  let res;
  try { res = await fetch("/api/queries"); } catch (e) { return; }
  if (!res.ok) return;
  const { queries } = await res.json();
  const ul = document.getElementById("recent-list");
  ul.innerHTML = "";
  if (!queries || !queries.length) {
    ul.innerHTML = '<li class="recent-empty">No questions yet. Ask one above to get started.</li>';
    return;
  }
  for (const q of queries) {
    const li = document.createElement("li");
    li.className = "recent-item" + (q.query_id === activeQueryId ? " active" : "");
    li.tabIndex = 0;
    const status = String(q.status || "");
    const chip = `<span class="chip-status chip-${status.toLowerCase()}">` +
                 `${esc(status)} ${q.done_count}/${q.total_count}</span>`;
    li.innerHTML = chip + esc(q.question_text);
    li.onclick = () => openQuery(q.query_id);
    li.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openQuery(q.query_id); } };
    ul.appendChild(li);
  }
}

async function openQuery(queryId) {
  // Source of truth for "which query owns the UI". Set this FIRST so that any
  // older in-flight openQuery loop can detect it has been superseded.
  activeQueryId = queryId;
  const runBtn = document.getElementById("run");
  const banner = document.getElementById("banner");
  const status = document.getElementById("status");

  let res;
  try {
    res = await fetch("/api/queries/" + encodeURIComponent(queryId));
  } catch (e) {
    // Network error: only surface it if we're still the active query.
    if (queryId !== activeQueryId) return;
    banner.innerHTML = '<div class="err">Couldn\'t load results — try again.</div>';
    runBtn.disabled = false;
    status.textContent = "";
    return;
  }
  // A newer openQuery/submit took over while we awaited the fetch — bail
  // silently (the active loop owns the timer/button/results now).
  if (queryId !== activeQueryId) return;
  if (!res.ok) {
    banner.innerHTML = '<div class="err">Couldn\'t load results — try again.</div>';
    runBtn.disabled = false;
    status.textContent = "";
    return;
  }

  const data = await res.json();
  // Re-check after the second await: a newer query may have taken over.
  if (queryId !== activeQueryId) return;

  renderAnswers(data.responses);
  if (data.query.status === "RUNNING") {
    status.textContent = "Running…";
    // Lock Run while a query is being polled so the user can't compound the race.
    runBtn.disabled = true;
    clearTimeout(pollTimer);
    pollTimer = setTimeout(() => openQuery(queryId), 2000);
  } else {
    clearTimeout(pollTimer);
    runBtn.disabled = false;
    if (data.query.status === "FAILED") {
      status.textContent = "Failed.";
      banner.innerHTML = `<div class="err">${esc(data.query.error_text || "Query failed.")}</div>`;
    } else {
      status.textContent = "Done.";
    }
    refreshRecent();
  }
}

async function submitQuestion() {
  const q = document.getElementById("question").value.trim();
  const banner = document.getElementById("banner");
  banner.innerHTML = "";
  if (!q) { banner.innerHTML = '<div class="err">Please enter a question.</div>'; return; }
  const persona = document.getElementById("persona").value;
  const brand = document.getElementById("brand").value.trim();
  const chosen = Array.from(document.querySelectorAll(".tgt:checked")).map(c => c.value);

  const body = {
    question: q,
    persona: persona || null,
    brand_focus: brand || null,
    targets: chosen.length ? chosen : null,
  };

  const runBtn = document.getElementById("run");
  const status = document.getElementById("status");
  runBtn.disabled = true; status.textContent = "Submitting…";

  let res;
  try {
    res = await fetch("/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
  } catch (e) {
    runBtn.disabled = false; status.textContent = "";
    banner.innerHTML = '<div class="err">Network error — please try again.</div>';
    return;
  }
  if (res.status === 400) {
    runBtn.disabled = false; status.textContent = "";
    banner.innerHTML = '<div class="err">Please enter a question.</div>';
    return;
  }
  if (res.status === 429) {
    runBtn.disabled = false; status.textContent = "";
    banner.innerHTML = '<div class="err">Query limit reached. Please try again later.</div>';
    return;
  }
  if (!res.ok) {
    runBtn.disabled = false; status.textContent = "";
    banner.innerHTML = '<div class="err">Could not submit question.</div>';
    return;
  }
  const { query_id } = await res.json();
  refreshRecent();
  openQuery(query_id);
}

document.getElementById("run").addEventListener("click", submitQuestion);
loadTargets();
// Script runs at the end of <body>, so the DOM is ready — load immediately.
refreshRecent();
</script>
