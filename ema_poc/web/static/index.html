<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EMA Playground</title>
<style>
/* ---- Design tokens (shared with dashboard) ---- */
/* AbbVie brand palette:
   --accent-deep / --accent: #071D49  AbbVie primary navy (logo + chrome)
   --accent-mid:             #0A2B6E  navy hover (lighter navy)
   Magenta accent:           #C8102E  AbbVie signature crimson-magenta (buttons, active, links)
   Source: faithful approximation of AbbVie corporate identity; abbvie.com returned 403 for all
   fetch attempts, so hex values are derived from the widely documented AbbVie brand guidelines
   (primary navy #071D49, brand red/magenta #C8102E). */
:root {
  --paper: #F0F2F7;
  --surface: #FFFFFF;
  --surface-2: #F4F5F9;
  --ink: #0D1B3E;
  --ink-soft: #3D4766;
  --ink-faint: #7E85A3;
  --rule: #CDD1E0;
  --rule-soft: #DDE0EC;
  --accent: #C8102E;
  --accent-deep: #071D49;
  --accent-mid: #A50D26;
  /* Semantic sentiment scale — kept visually distinct from brand navy/magenta */
  --pos: #1A7A4A;
  --pos-soft: #D4EED9;
  --neu: #A07010;
  --neu-soft: #F5E8C8;
  --neg: #C8102E;
  --neg-soft: #FAD9DE;
  /* Typography */
  --serif: "Iowan Old Style", "Hoefler Text", Georgia, "Times New Roman", serif;
  --sans: ui-sans-serif, -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  /* Radii / shadows */
  --radius: 4px;
  --radius-lg: 8px;
  --shadow-sm: 0 1px 3px rgba(7, 29, 73, 0.08), 0 1px 2px rgba(7, 29, 73, 0.04);
  --shadow-card: 0 1px 0 rgba(7, 29, 73, 0.03), 0 10px 24px -20px rgba(7, 29, 73, 0.32);
}

/* ---- Reset ---- */
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; font-size: 15px; }
body {
  font-family: var(--sans);
  font-size: 1rem;
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
}

/* ---- Header ---- */
header {
  background: var(--accent-deep);
  color: #fff;
  padding: .85rem 1.6rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  box-shadow: 0 1px 8px -4px rgba(7, 29, 73, 0.5);
  position: sticky;
  top: 0;
  z-index: 10;
}
header h1 {
  margin: 0;
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 600;
  letter-spacing: -.01em;
  flex: 1;
  color: #FFFFFF;
}
.navlink {
  color: rgba(255, 255, 255, .88);
  text-decoration: none;
  font-family: var(--sans);
  font-size: .8rem;
  font-weight: 500;
  letter-spacing: .01em;
  padding: .35rem .9rem;
  border: 1px solid rgba(255, 255, 255, .35);
  border-radius: var(--radius);
  white-space: nowrap;
  transition: background .15s, color .15s, border-color .15s;
}
.navlink:hover {
  background: rgba(255, 255, 255, .15);
  color: #fff;
  border-color: rgba(255, 255, 255, .6);
}
.navlink:focus-visible {
  outline: 2px solid rgba(255, 255, 255, .7);
  outline-offset: 2px;
}

/* ---- Main layout ---- */
main {
  max-width: 1100px;
  margin: 1.75rem auto;
  padding: 0 1.25rem;
}

/* ---- Panel (query form) ---- */
.panel {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 1.4rem 1.6rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow-card);
}

/* ---- Section kicker label above textarea ---- */
.panel-label {
  display: block;
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: .4rem;
}

/* ---- Form controls ---- */
textarea {
  width: 100%;
  box-sizing: border-box;
  min-height: 80px;
  font-family: var(--sans);
  font-size: 1rem;
  color: var(--ink);
  padding: .65rem .85rem;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  background: var(--surface-2);
  resize: vertical;
  line-height: 1.6;
  transition: border-color .15s, box-shadow .15s;
}
textarea::placeholder { color: var(--ink-faint); }
textarea:focus {
  outline: none;
  border-color: var(--accent-deep);
  box-shadow: 0 0 0 3px rgba(7, 29, 73, .12);
  background: var(--surface);
}

.row {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  align-items: flex-end;
  margin-top: 1rem;
}

/* Form field labels: clean sans kicker + control stacked */
label {
  font-family: var(--sans);
  font-size: .75rem;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--ink-faint);
  display: flex;
  flex-direction: column;
  gap: .3rem;
}
label span {
  font-family: var(--sans);
  font-size: .9rem;
  font-weight: 400;
  letter-spacing: normal;
  text-transform: none;
  color: var(--ink-soft);
}

select, input[type="text"] {
  font-family: var(--sans);
  font-size: .9rem;
  color: var(--ink);
  padding: .4rem .55rem;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  background: var(--surface);
  transition: border-color .15s, box-shadow .15s;
}
select:focus, input[type="text"]:focus {
  outline: none;
  border-color: var(--accent-deep);
  box-shadow: 0 0 0 3px rgba(7, 29, 73, .12);
}

/* ---- Targets row ---- */
.targets {
  display: flex;
  flex-wrap: wrap;
  gap: .4rem .9rem;
  align-items: center;
  padding: .7rem .85rem;
  background: var(--surface-2);
  border: 1px solid var(--rule-soft);
  border-radius: var(--radius);
  margin-top: 1rem;
}
.targets label {
  flex-direction: row;
  align-items: center;
  gap: .4rem;
  font-family: var(--sans);
  font-size: .875rem;
  font-weight: 400;
  letter-spacing: normal;
  text-transform: none;
  color: var(--ink-soft);
  cursor: pointer;
  white-space: nowrap;
  padding: .1rem 0;
}
.targets label input[type="checkbox"] {
  accent-color: var(--accent);
  width: 15px;
  height: 15px;
  cursor: pointer;
}

/* ---- Run button ---- */
button#run {
  font-family: var(--sans);
  font-size: .875rem;
  font-weight: 600;
  letter-spacing: .02em;
  background: var(--accent);
  color: #fff;
  border: 0;
  border-radius: var(--radius);
  padding: .55rem 1.5rem;
  cursor: pointer;
  transition: background .15s, transform .1s;
  box-shadow: 0 1px 3px rgba(200, 16, 46, .28);
}
button#run:hover { background: var(--accent-mid); }
button#run:active { transform: scale(.97); }
button#run:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
button#run:disabled {
  opacity: .5;
  cursor: default;
  transform: none;
}

/* ---- Status spinner ---- */
.spinner {
  font-family: var(--sans);
  font-size: .875rem;
  color: var(--ink-faint);
}
/* pulsing animation for "Running…" state, respects prefers-reduced-motion */
@keyframes pulse-fade {
  0%, 100% { opacity: 1; }
  50%       { opacity: .45; }
}
.spinner:not(:empty) {
  animation: pulse-fade 1.4s ease-in-out infinite;
}
@media (prefers-reduced-motion: reduce) {
  .spinner:not(:empty) { animation: none; }
}

/* ---- Compliance note ---- */
.note {
  font-family: var(--sans);
  font-size: .8rem;
  color: var(--ink-faint);
  margin-top: 1rem;
  padding: .55rem .85rem;
  background: var(--surface-2);
  border-left: 3px solid var(--rule);
  border-radius: 0 var(--radius) var(--radius) 0;
  line-height: 1.55;
}

/* ---- Error banner ---- */
#banner { margin-bottom: .5rem; }
.err {
  background: var(--neg-soft);
  color: var(--neg);
  border: 1px solid #F4A8B5;
  padding: .7rem 1rem;
  border-radius: var(--radius);
  font-size: .9rem;
  font-weight: 500;
  line-height: 1.5;
}

/* ---- Results grid ---- */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1.2rem;
}

/* ---- Result cards ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 1.2rem 1.4rem;
  box-shadow: var(--shadow-card);
  transition: box-shadow .15s;
  /* Staggered reveal */
  animation: card-in .25s ease both;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  .card { animation: none; }
}
.card:hover { box-shadow: 0 4px 18px -8px rgba(7, 29, 73, .25); }
.card h3 {
  margin: 0 0 .35rem;
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -.01em;
  display: flex;
  align-items: center;
  gap: .4rem;
}

/* ---- Badges (e.g. "web" grounded indicator) ---- */
.badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .05em;
  text-transform: uppercase;
  background: rgba(7, 29, 73, .08);
  color: var(--accent-deep);
  border: 1px solid rgba(7, 29, 73, .18);
  border-radius: 999px;
  padding: .1rem .45rem;
  vertical-align: middle;
}

/* ---- Chips (sentiment, positioning) ---- */
.chip {
  display: inline-block;
  font-family: var(--sans);
  font-size: .8rem;
  font-weight: 500;
  letter-spacing: .01em;
  border-radius: 999px;
  padding: .2rem .65rem;
  margin-right: .35rem;
  border: 1px solid transparent;
  white-space: nowrap;
}
/* Shared chip vocabulary — mirrors dashboard semantic scale */
/* Positive positioning */
.chip[style*="#d6f5d6"],
.chip[style*="#e6f0ff"] {
  background: var(--pos-soft) !important;
  color: #14593A !important;
  border-color: #A8D9BA !important;
  /* inline style overrides handled below via JS-injected colors */
}
/* Score chips use surface */
.chip[style*="#f0f0f0"] {
  background: var(--surface-2) !important;
  color: var(--ink-soft) !important;
  border-color: var(--rule) !important;
}
/* NOT_RECOMMENDED and NOT_MENTIONED prominence */
.chip[style*="#fdd"] {
  background: var(--neg-soft) !important;
  color: var(--neg) !important;
  border-color: #F4A8B5 !important;
  font-weight: 600 !important;
}

/* ---- Answer text ---- */
.answer {
  white-space: pre-wrap;
  font-size: .9375rem;
  line-height: 1.65;
  margin: .6rem 0;
  color: var(--ink);
}

/* ---- Citations ---- */
.citations {
  font-size: .8125rem;
  border-top: 1px solid var(--rule-soft);
  padding-top: .55rem;
  margin-top: .45rem;
  color: var(--ink-soft);
}
.citations strong {
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.citations a {
  color: var(--accent-deep);
  text-decoration: none;
}
.citations a:hover { text-decoration: underline; color: var(--accent); }
.citations a:focus-visible { outline: 2px solid var(--accent-deep); outline-offset: 1px; border-radius: 2px; }
.citations ul {
  margin: .3rem 0 0;
  padding-left: 1.2rem;
}
.citations li { margin: .25rem 0; }

/* ---- Score row ---- */
.score {
  display: flex;
  flex-wrap: wrap;
  gap: .3rem;
  margin: .4rem 0;
}
</style>
</head>
<body>
<header>
  <h1>Evidence Monitoring &mdash; Real-Time Playground</h1>
  <a href="/dashboard" class="navlink">Dashboard &rarr;</a>
</header>
<main>
  <div class="panel">
    <textarea id="question" placeholder="Ask any question (do NOT enter PII/PHI)&hellip;"></textarea>
    <div class="row">
      <label>Persona
        <select id="persona">
          <option value="">(default)</option>
          <option>Prospect</option><option>Provider</option><option>Patient</option>
        </select>
      </label>
      <label>Brand focus
        <input id="brand" type="text" placeholder="e.g. Skyrizi" size="14">
      </label>
    </div>
    <div class="row targets" id="targets"></div>
    <div class="row">
      <button id="run">Run</button>
      <span id="status" class="spinner"></span>
    </div>
    <div class="note">Sandbox mode &mdash; results are stored separately from the approval-gated monitoring data and never feed the official dashboard. Do not enter PII/PHI (SE-001).</div>
  </div>
  <div id="banner"></div>
  <div class="grid" id="results"></div>
</main>
<script>
const POSCOLOR = {
  FIRST_LINE_RECOMMENDED: "#d6f5d6", AMONG_OPTIONS: "#e6f0ff",
  SECOND_LINE: "#fff2cc", NOT_RECOMMENDED: "#fdd", NOT_MENTIONED: "#eee"
};
function esc(s){ return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
  {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function safeUrl(u){ u = String(u || ""); return /^https?:\/\//i.test(u) ? u : "#"; }
let targetsData = [];

async function loadTargets() {
  const res = await fetch("/api/targets");
  const data = await res.json();
  targetsData = data.targets;
  const box = document.getElementById("targets");
  box.innerHTML = targetsData.map(t =>
    `<label><input type="checkbox" class="tgt" value="${t.name}" checked> ${t.name}` +
    (t.grounded ? ' <span class="badge">web</span>' : '') + `</label>`
  ).join("");
}

function cardId(name){ return "card-" + name.replace(/[^a-zA-Z0-9]/g, "_"); }

function ensureCard(name, grounded) {
  let el = document.getElementById(cardId(name));
  if (!el) {
    el = document.createElement("div");
    el.className = "card";
    el.id = cardId(name);
    el.innerHTML = `<h3>${esc(name)}${grounded ? ' <span class="badge">web</span>' : ''}</h3>` +
                   `<div class="score"></div><div class="answer"></div><div class="citations"></div>`;
    document.getElementById("results").appendChild(el);
  }
  return el;
}

function run() {
  const q = document.getElementById("question").value.trim();
  const banner = document.getElementById("banner");
  banner.innerHTML = "";
  if (!q) { banner.innerHTML = '<div class="err">Please enter a question.</div>'; return; }
  document.getElementById("results").innerHTML = "";
  const persona = document.getElementById("persona").value;
  const brand = document.getElementById("brand").value.trim();
  const chosen = Array.from(document.querySelectorAll(".tgt:checked")).map(c => c.value);
  if (!chosen.length) { banner.innerHTML = '<div class="err">Select at least one target.</div>'; return; }

  const params = new URLSearchParams({ question: q, targets: chosen.join(",") });
  if (persona) params.set("persona", persona);
  if (brand) params.set("brand_focus", brand);

  const runBtn = document.getElementById("run");
  const status = document.getElementById("status");
  runBtn.disabled = true; status.textContent = "Running…";

  const es = new EventSource("/api/ask/stream?" + params.toString());
  const groundedByName = Object.fromEntries(targetsData.map(t => [t.name, t.grounded]));

  es.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    if (ev.event === "answer") {
      const card = ensureCard(ev.llm_name, ev.grounded || groundedByName[ev.llm_name]);
      card.querySelector(".answer").textContent = ev.answer_text || "(no answer — " + ev.status + ")";
      if (ev.citations && ev.citations.length) {
        card.querySelector(".citations").innerHTML = "<strong>Sources:</strong><ul>" +
          ev.citations.map(c =>
            `<li><a href="${esc(safeUrl(c.url))}" target="_blank" rel="noopener noreferrer">${esc(c.title || c.url)}</a></li>`
          ).join("") + "</ul>";
      }
    } else if (ev.event === "score") {
      const card = ensureCard(ev.llm_name, groundedByName[ev.llm_name]);
      const color = POSCOLOR[ev.competitive_position] || "#eee";
      card.querySelector(".score").innerHTML =
        `<span class="chip" style="background:${color}">${esc(ev.competitive_position)}</span>` +
        `<span class="chip" style="background:#f0f0f0">sentiment ${esc(ev.sentiment_score)}</span>`;
    } else if (ev.event === "error") {
      banner.innerHTML = `<div class="err">${esc(ev.message || "Error")}</div>`;
    } else if (ev.event === "done") {
      es.close(); runBtn.disabled = false; status.textContent = "Done.";
    }
  };
  es.onerror = () => { es.close(); runBtn.disabled = false; status.textContent = "Connection closed."; };
}

document.getElementById("run").addEventListener("click", run);
loadTargets();
</script>
</body>
</html>
