name: Deploy to Fly.io

# Auto-deploy on every push to main (and manually via the Actions tab).
# Requires a repo secret FLY_API_TOKEN (create with: fly tokens create deploy).
#
# NOTE: CI checks out the repo, which by design contains NO demo data
# (ema_demo.sqlite is gitignored). Data lives on a persistent Fly volume mounted
# at /app/data (see fly.toml [mounts]); once seeded by a one-time local `fly deploy`
# these CI deploys redeploy the code and the volume data PERSISTS. See DEPLOY.md
# → "Persistent data volume".

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    name: fly deploy
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
