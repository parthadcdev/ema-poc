[project]
name = "ema-poc"
version = "0.1.0"
description = "Evidence Monitoring Agent POC"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2",
    "pyyaml",
    "openpyxl",
    "anthropic",
    "openai",
    "google-generativeai",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-cov"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[tool.coverage.run]
source = ["ema_poc"]
