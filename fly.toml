app = "ema-poc"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  PLAYGROUND_MAX_QUERIES_PER_HOUR = "60"
  APP_USER = "abbvie"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
